<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 1200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#121212"/>
      <stop offset="100%" stop-color="#1e1e1e"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#26a69a" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#26a69a" stop-opacity="0"/>
    </radialGradient>
    <style>
      .titleEn { font: 800 72px Inter, sans-serif; fill:#ffffff;}
      .line { font: 400 30px Inter, sans-serif; fill:#d0d0d0;}
      .tiny { font: 600 16px Inter, sans-serif; fill:#9e9e9e; letter-spacing:0.08em;}
    </style>
  </defs>

  <rect width="1200" height="1200" fill="url(#bg)"/>
  <rect width="1200" height="1200" fill="url(#glow)"/>

  <rect x="80" y="80" width="1040" height="1040" rx="36"
        fill="#1e1e1e" stroke="#2e2e2e"/>

  <!-- Icon -->
  <g transform="translate(600 330)">
    <circle r="90" fill="none" stroke="#26a69a" stroke-width="8"/>
    <circle r="68" fill="none" stroke="#e6c349" stroke-width="5" stroke-dasharray="10 8"/>
    <path d="M0 -55V0L34 34" stroke="#26a69a" stroke-width="6" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="4" fill="#e6c349"/>
  </g>

  <text
    x="600"
    y="600"
    text-anchor="middle"
    fill="#e6c349"
    font-family="Noto Sans Arabic, sans-serif"
    font-size="72"
    font-weight="700"
    direction="rtl"
    unicode-bidi="bidi-override"
    xml:lang="ar"
  >
    عودة
  </text>

  <text x="600" y="680" text-anchor="middle" class="titleEn">Awdah</text>

  <text x="600" y="880" text-anchor="middle" class="tiny">
    Privacy-first • Resilient • Event-driven
  </text>
</svg>