<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Awdah</title>
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'sha256-qRuXeqkdQTHnPcJXXhDo6TkgmCMIR8MzQXtu1sHc6NM='; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https: http://localhost:* ws://localhost:*; font-src 'self' data:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'"
    />
    <!--
      GitHub Pages SPA routing — redirects all 404s back to index.html
      while preserving the requested path as a query parameter.

      The index.html script reads this back and restores the path with
      window.history.replaceState before React Router initialises.

      Path segments to keep: 1 (the repo name segment /awdah/)
      Based on https://github.com/rafgraph/spa-github-pages (MIT)
    -->
    <script>
      var pathSegmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol +
          '//' +
          l.host +
          l.pathname
            .split('/')
            .slice(0, 1 + pathSegmentsToKeep)
            .join('/') +
          '/?/' +
          l.pathname
            .slice(1)
            .split('/')
            .slice(pathSegmentsToKeep)
            .join('/')
            .replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash,
      );
    </script>
  </head>
  <body></body>
</html>
