openapi: 3.1.0
info:
  title: Awdah API
  version: 1.0.0
  description: |
    Awdah is a serverless Islamic ibadah tracker for making up missed Salah and Sawm.

    ## Authentication

    All endpoints except `GET /health` require a valid **Cognito JWT** passed as a
    `Bearer` token in the `Authorization` header. The gateway validates the token and
    injects the authenticated user id (`sub` claim) into the request context —
    handlers never accept a caller-supplied user id.

    ## Date format

    All dates are **Hijri** in `YYYY-MM-DD` format (e.g. `1446-09-01`).
    Gregorian-to-Hijri conversion must happen before calling the API.

    ## Error shape

    Every error response follows the same envelope:

    ```json
    {
      "error": {
        "code": "VALIDATION_ERROR",
        "message": "Human-readable description"
      }
    }
    ```

    Error codes: `VALIDATION_ERROR` (400), `UNAUTHENTICATED` (401),
    `FORBIDDEN` (403), `NOT_FOUND` (404), `CONFLICT` (409),
    `INTERNAL_ERROR` (500).

servers:
  - url: http://localhost:3000
    description: Local Simulation Server
  - url: https://{apiId}.execute-api.{region}.amazonaws.com
    description: AWS API Gateway
    variables:
      apiId:
        default: your-api-id
      region:
        default: eu-west-1

security:
  - CognitoJWT: []

tags:
  - name: health
    description: Infrastructure health check
  - name: salah
    description: Obligatory daily prayers — logging, debt, and history
  - name: sawm
    description: Obligatory fasting — logging, debt, and history
  - name: user
    description: User profile and settings

paths:
  # ---------------------------------------------------------------------------
  # Health
  # ---------------------------------------------------------------------------
  /health:
    get:
      operationId: getHealth
      tags: [health]
      summary: Health check
      description: Returns 200 if the service is running. No authentication required.
      security: []
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                required: [status, timestamp]
                properties:
                  status:
                    type: string
                    example: UP
                  timestamp:
                    type: string
                    format: date-time
                    example: '2026-04-01T09:30:00.000Z'
                  environment:
                    type: string
                    nullable: true
                    example: production

  # ---------------------------------------------------------------------------
  # Salah — prayer logs
  # ---------------------------------------------------------------------------
  /v1/salah/log:
    post:
      operationId: logPrayer
      tags: [salah]
      summary: Log a prayer
      description: |
        Records a single obligatory prayer as either performed on time (`obligatory`)
        or as a make-up prayer (`qadaa`). The server records the log and returns a
        success message; it does not return a log event id for this endpoint.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogPrayerRequest'
            examples:
              fajrOnTime:
                summary: Fajr performed on time
                value:
                  date: '1446-09-01'
                  prayerName: fajr
                  type: obligatory
              dhuhrQadaa:
                summary: Dhuhr as qadaa
                value:
                  date: '1446-09-01'
                  prayerName: dhuhr
                  type: qadaa
      responses:
        '201':
          description: Prayer logged
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '500':
          $ref: '#/components/responses/InternalError'

    delete:
      operationId: deletePrayerLog
      tags: [salah]
      summary: Delete a prayer log entry
      description: |
        Deletes the matching prayer log entry for the given Hijri date, prayer name,
        and log type. The implementation records a deselection event rather than
        hard-deleting the original log row.
      parameters:
        - $ref: '#/components/parameters/date'
        - name: prayerName
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/PrayerName'
        - name: type
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/LogType'
      responses:
        '200':
          description: Prayer log entry deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '500':
          $ref: '#/components/responses/InternalError'

  # ---------------------------------------------------------------------------
  # Salah — reset all logs
  # ---------------------------------------------------------------------------
  /v1/salah/logs:
    delete:
      operationId: resetSalahLogs
      tags: [salah]
      summary: Delete all Salah prayer logs
      description: |
        Permanently deletes all prayer log entries (daily tracker and qadaa) for the
        authenticated user. The user's profile, bulugh date, and practicing periods are
        not affected. Debt is recalculated on the next call to `GET /v1/salah/debt`.
      responses:
        '202':
          description: Prayer log reset started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserLifecycleJobStartResponse'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '500':
          $ref: '#/components/responses/InternalError'

  # ---------------------------------------------------------------------------
  # Salah — debt
  # ---------------------------------------------------------------------------
  /v1/salah/debt:
    get:
      operationId: getSalahDebt
      tags: [salah]
      summary: Get Salah qadaa debt summary
      description: |
        Calculates and returns the user's total Salah qadaa debt based on their
        practicing-period history and completed qadaa log. All arithmetic runs
        server-side in Hijri. Never returns a negative value.
      responses:
        '200':
          description: Debt summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SalahDebtResponse'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '404':
          description: User profile not found — onboarding not yet complete
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          $ref: '#/components/responses/InternalError'

  # ---------------------------------------------------------------------------
  # Salah — history
  # ---------------------------------------------------------------------------
  /v1/salah/history:
    get:
      operationId: getSalahHistory
      tags: [salah]
      summary: Get prayer log history
      description: Returns all prayer log entries for the authenticated user within the given Hijri date range (inclusive).
      parameters:
        - name: startDate
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/HijriDate'
          description: Start of the date range (Hijri, inclusive)
        - name: endDate
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/HijriDate'
          description: End of the date range (Hijri, inclusive)
      responses:
        '200':
          description: List of prayer log entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PrayerLogEntry'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '500':
          $ref: '#/components/responses/InternalError'

  /v1/salah/history/page:
    get:
      operationId: getSalahHistoryPage
      tags: [salah]
      summary: Get paged prayer log history
      description: Returns a paginated list of prayer log entries for the authenticated user within the given Hijri date range.
      parameters:
        - name: startDate
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/HijriDate'
          description: Start of the date range (Hijri, inclusive)
        - name: endDate
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/HijriDate'
          description: End of the date range (Hijri, inclusive)
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 100
            maximum: 200
          description: Maximum number of items to return in the page
        - name: cursor
          in: query
          required: false
          schema:
            type: string
          description: Pagination cursor returned in the previous response
      responses:
        '200':
          description: Paginated list of prayer log entries
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PrayerHistoryPage'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '500':
          $ref: '#/components/responses/InternalError'

  # ---------------------------------------------------------------------------
  # Salah — practicing periods
  # ---------------------------------------------------------------------------
  /v1/salah/practicing-period:
    post:
      operationId: addPracticingPeriod
      tags: [salah]
      summary: Add a practicing period
      description: |
        Records a period during which the user was fully practicing. Gaps between
        the bulugh date and any practicing period are used to calculate qadaa debt.
        Periods must not overlap. The `type` field controls which debt calculation
        this period applies to: `salah`, `sawm`, or `both`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddPracticingPeriodRequest'
            examples:
              bothContexts:
                summary: Period covering both Salah and Sawm
                value:
                  startDate: '1440-01-01'
                  endDate: '1445-12-30'
                  type: both
      responses:
        '201':
          description: Period created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddPracticingPeriodResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '409':
          description: Overlapping period already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          $ref: '#/components/responses/InternalError'

    put:
      operationId: updatePracticingPeriod
      tags: [salah]
      summary: Update a practicing period
      description: |
        Updates an existing practicing period in place. The period keeps the same
        `periodId`, and the updated range must still remain non-overlapping with
        the user's other recorded periods.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePracticingPeriodRequest'
      responses:
        '200':
          description: Period updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Updated period overlaps with an existing period
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          $ref: '#/components/responses/InternalError'

    delete:
      operationId: deletePracticingPeriod
      tags: [salah]
      summary: Delete a practicing period
      description: Removes a specific practicing period. Debt is recalculated the next time `GET /v1/salah/debt` or `GET /v1/sawm/debt` is called.
      parameters:
        - name: periodId
          in: query
          required: true
          schema:
            type: string
            minLength: 1
            example: '01HTBZ1234ABCDEFGHIJKLMNOP'
      responses:
        '200':
          description: Period deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '500':
          $ref: '#/components/responses/InternalError'

  /v1/salah/practicing-periods:
    get:
      operationId: getPracticingPeriods
      tags: [salah]
      summary: List all practicing periods
      description: Returns all practicing periods recorded by the authenticated user, in no guaranteed order.
      responses:
        '200':
          description: List of practicing periods
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PracticingPeriod'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '500':
          $ref: '#/components/responses/InternalError'

  # ---------------------------------------------------------------------------
  # Sawm — fast logs
  # ---------------------------------------------------------------------------
  /v1/sawm/log:
    post:
      operationId: logFast
      tags: [sawm]
      summary: Log a fast
      description: |
        Records a single fasting day as either a current obligatory fast (`obligatory`)
        or a make-up qadaa fast (`qadaa`).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogFastRequest'
            examples:
              qadaaFast:
                summary: Qadaa fast
                value:
                  date: '1446-09-01'
                  type: qadaa
      responses:
        '201':
          description: Fast logged
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '500':
          $ref: '#/components/responses/InternalError'

    delete:
      operationId: deleteFastLog
      tags: [sawm]
      summary: Delete a fast log entry
      description: Deletes the matching fast log entry for the given Hijri date and event id.
      parameters:
        - $ref: '#/components/parameters/date'
        - name: eventId
          in: query
          required: true
          schema:
            type: string
            minLength: 1
            example: '01HTBZ1234ABCDEFGHIJKLMNOP'
      responses:
        '200':
          description: Fast log entry deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '500':
          $ref: '#/components/responses/InternalError'

  # ---------------------------------------------------------------------------
  # Sawm — reset all logs
  # ---------------------------------------------------------------------------
  /v1/sawm/logs:
    delete:
      operationId: resetSawmLogs
      tags: [sawm]
      summary: Delete all Sawm fast logs
      description: |
        Permanently deletes all fast log entries for the authenticated user. The user's
        profile, bulugh date, and practicing periods are not affected. Debt is
        recalculated on the next call to `GET /v1/sawm/debt`.
      responses:
        '202':
          description: Fast log reset started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserLifecycleJobStartResponse'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '500':
          $ref: '#/components/responses/InternalError'

  # ---------------------------------------------------------------------------
  # Sawm — debt
  # ---------------------------------------------------------------------------
  /v1/sawm/debt:
    get:
      operationId: getSawmDebt
      tags: [sawm]
      summary: Get Sawm qadaa debt summary
      description: |
        Calculates and returns the user's total Ramadan qadaa debt based on their
        practicing-period history and completed qadaa fasting log. Ramadan day
        counts (29 or 30) are derived from the Hijri calendar library — never
        hardcoded.
      responses:
        '200':
          description: Debt summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SawmDebtResponse'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '404':
          description: User profile not found — onboarding not yet complete
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          $ref: '#/components/responses/InternalError'

  # ---------------------------------------------------------------------------
  # Sawm — history
  # ---------------------------------------------------------------------------
  /v1/sawm/history:
    get:
      operationId: getSawmHistory
      tags: [sawm]
      summary: Get fast log history
      description: Returns all fast log entries for the authenticated user within the given Hijri date range (inclusive).
      parameters:
        - name: startDate
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/HijriDate'
          description: Start of the date range (Hijri, inclusive)
        - name: endDate
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/HijriDate'
          description: End of the date range (Hijri, inclusive)
      responses:
        '200':
          description: List of fast log entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FastLogEntry'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '500':
          $ref: '#/components/responses/InternalError'

  /v1/sawm/history/page:
    get:
      operationId: getSawmHistoryPage
      tags: [sawm]
      summary: Get paged fast log history
      description: Returns a paginated list of fast log entries for the authenticated user within the given Hijri date range.
      parameters:
        - name: startDate
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/HijriDate'
          description: Start of the date range (Hijri, inclusive)
        - name: endDate
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/HijriDate'
          description: End of the date range (Hijri, inclusive)
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 100
            maximum: 200
          description: Maximum number of items to return in the page
        - name: cursor
          in: query
          required: false
          schema:
            type: string
          description: Pagination cursor returned in the previous response
      responses:
        '200':
          description: Paginated list of fast log entries
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FastHistoryPage'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '500':
          $ref: '#/components/responses/InternalError'

  # ---------------------------------------------------------------------------
  # User profile
  # ---------------------------------------------------------------------------
  /v1/user/profile:
    get:
      operationId: getUserProfile
      tags: [user]
      summary: Get user profile
      description: Returns the authenticated user's settings. Returns 404 if onboarding has not been completed.
      responses:
        '200':
          description: User settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSettings'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '404':
          description: Profile not found — onboarding not yet complete
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          $ref: '#/components/responses/InternalError'

    post:
      operationId: updateUserProfile
      tags: [user]
      summary: Create or update user profile
      description: |
        Creates the user profile on first call (onboarding) or updates it on
        subsequent calls. Saving a new `bulughDate` triggers a debt recalculation
        on the next call to the debt endpoints.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserSettingsRequest'
            examples:
              maleUser:
                summary: Male user profile
                value:
                  bulughDate: '1430-06-15'
                  gender: male
      responses:
        '200':
          description: Profile saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '500':
          $ref: '#/components/responses/InternalError'

  /v1/user/account:
    delete:
      operationId: deleteAccount
      tags: [user]
      summary: Start account deletion
      description: |
        Starts an asynchronous account-deletion job for the authenticated user.
        The heavy data cleanup runs in the background; sign-in cleanup is finalized separately.
      responses:
        '202':
          description: Account deletion job started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserLifecycleJobStartResponse'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '500':
          $ref: '#/components/responses/InternalError'

  /v1/user/account/auth:
    delete:
      operationId: finalizeDeleteAccount
      tags: [user]
      summary: Finalize account sign-in cleanup
      description: |
        Deletes the authenticated user's Cognito sign-in access after the async
        account-data deletion job has completed.
      parameters:
        - $ref: '#/components/parameters/jobId'
      responses:
        '200':
          description: Account auth cleanup result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteAccountResponse'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalError'

  /v1/user/jobs/status:
    get:
      operationId: getUserLifecycleJobStatus
      tags: [user]
      summary: Get lifecycle job status
      parameters:
        - $ref: '#/components/parameters/jobId'
      responses:
        '200':
          description: Lifecycle job status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserLifecycleJobStatusResponse'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /v1/user/export:
    post:
      operationId: startExportData
      tags: [user]
      summary: Start user data export
      description: |
        Starts an asynchronous user-data export job for the authenticated user.
      responses:
        '202':
          description: User data export job started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserLifecycleJobStartResponse'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '500':
          $ref: '#/components/responses/InternalError'
    get:
      operationId: downloadExportData
      tags: [user]
      summary: Download completed user data export
      description: |
        Returns the completed export payload for a previously started export job.
      parameters:
        - $ref: '#/components/parameters/jobId'
      responses:
        '200':
          description: User data export
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExportDownloadResponse'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalError'

# =============================================================================
# Components
# =============================================================================
components:
  securitySchemes:
    CognitoJWT:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Cognito access token issued after sign-in

  parameters:
    date:
      name: date
      in: query
      required: true
      schema:
        $ref: '#/components/schemas/HijriDate'
      description: Hijri date in YYYY-MM-DD format
    jobId:
      name: jobId
      in: query
      required: true
      schema:
        type: string
        minLength: 1
      description: Background lifecycle job identifier

  schemas:
    # -------------------------------------------------------------------------
    # Primitives
    # -------------------------------------------------------------------------
    HijriDate:
      type: string
      pattern: '^\d{4}-\d{2}-\d{2}$'
      description: Hijri calendar date in YYYY-MM-DD format
      example: '1446-09-01'

    PrayerName:
      type: string
      enum: [fajr, dhuhr, asr, maghrib, isha]
      description: One of the five obligatory daily prayers

    LogType:
      type: string
      enum: [obligatory, qadaa]
      description: |
        `obligatory` — performed in its proper time; `qadaa` — a make-up for a
        previously missed prayer or fast

    PracticingPeriodType:
      type: string
      enum: [salah, sawm, both]
      description: Which debt calculation this practicing period applies to

    Gender:
      type: string
      enum: [male, female]

    Madhab:
      type: string
      enum: [hanafi, shafii, maliki, hanbali, jafari]

    CalculationMethod:
      type: string
      enum: [MWL, ISNA, Egypt, Makkah, Karachi, Tehran, Jafari]

    MoonSightingPreference:
      type: string
      enum: [global, local, calculation]

    LocationCoordinates:
      type: object
      required: [lat, lon]
      additionalProperties: false
      properties:
        lat:
          type: number
        lon:
          type: number

    Location:
      type: object
      required: [city, country]
      additionalProperties: false
      properties:
        city:
          type: string
        country:
          type: string
        coords:
          allOf:
            - $ref: '#/components/schemas/LocationCoordinates'
          nullable: true

    # -------------------------------------------------------------------------
    # Requests
    # -------------------------------------------------------------------------
    LogPrayerRequest:
      type: object
      required: [date, prayerName, type]
      additionalProperties: false
      properties:
        date:
          $ref: '#/components/schemas/HijriDate'
        prayerName:
          $ref: '#/components/schemas/PrayerName'
        type:
          $ref: '#/components/schemas/LogType'

    LogFastRequest:
      type: object
      required: [date, type]
      additionalProperties: false
      properties:
        date:
          $ref: '#/components/schemas/HijriDate'
        type:
          $ref: '#/components/schemas/LogType'

    AddPracticingPeriodRequest:
      type: object
      required: [startDate, type]
      additionalProperties: false
      properties:
        startDate:
          $ref: '#/components/schemas/HijriDate'
        endDate:
          allOf:
            - $ref: '#/components/schemas/HijriDate'
          nullable: true
          description: Omit or set to null for an open-ended period (user is currently practicing). When provided, must not be earlier than startDate (validated server-side).
        type:
          $ref: '#/components/schemas/PracticingPeriodType'

    UpdatePracticingPeriodRequest:
      type: object
      required: [periodId, startDate, type]
      additionalProperties: false
      properties:
        periodId:
          type: string
          minLength: 1
          example: '01HTBZ1234ABCDEFGHIJKLMNOP'
        startDate:
          $ref: '#/components/schemas/HijriDate'
        endDate:
          allOf:
            - $ref: '#/components/schemas/HijriDate'
          nullable: true
          description: Omit or set to null for an open-ended period (user is currently practicing). When provided, must not be earlier than startDate (validated server-side).
        type:
          $ref: '#/components/schemas/PracticingPeriodType'

    UpdateUserSettingsRequest:
      type: object
      required: [bulughDate, gender]
      additionalProperties: false
      properties:
        username:
          type: string
          maxLength: 40
          nullable: true
          description: Optional display name stored with the profile
        dateOfBirth:
          allOf:
            - $ref: '#/components/schemas/HijriDate'
          nullable: true
          description: Optional date of birth in Hijri — used as a reference, stored but not required for debt calculation
        bulughDate:
          $ref: '#/components/schemas/HijriDate'
        revertDate:
          allOf:
            - $ref: '#/components/schemas/HijriDate'
          nullable: true
          description: Optional date of reversion to Islam — when present and later than bulughDate, debt calculation starts from this date. Must not be earlier than bulughDate (validated server-side).
        gender:
          $ref: '#/components/schemas/Gender'

    # -------------------------------------------------------------------------
    # Responses
    # -------------------------------------------------------------------------
    MessageResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string
          example: 'Prayer logged successfully'

    UserLifecycleJob:
      type: object
      required: [jobId, type, status, requestedAt]
      properties:
        jobId:
          type: string
          example: '01JQ3H9QYB3Y9Y8STK3T8M2Q0P'
        type:
          type: string
          enum: [export, delete-account]
        status:
          type: string
          enum: [pending, processing, completed, failed]
        requestedAt:
          type: string
          format: date-time
        startedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
        errorMessage:
          type: string
        exportFileName:
          type: string
        exportContentType:
          type: string
        exportChunkCount:
          type: integer
          minimum: 0
        authCleanupRequired:
          type: boolean
        authDeleted:
          type: boolean
        authCleanupCompletedAt:
          type: string
          format: date-time

    UserLifecycleJobStartResponse:
      type: object
      required: [message, job]
      properties:
        message:
          type: string
        job:
          $ref: '#/components/schemas/UserLifecycleJob'

    UserLifecycleJobStatusResponse:
      type: object
      required: [job]
      properties:
        job:
          $ref: '#/components/schemas/UserLifecycleJob'

    DeleteAccountResponse:
      type: object
      required: [message, authDeleted]
      properties:
        message:
          type: string
        authDeleted:
          type: boolean

    ExportDownloadResponse:
      type: object
      required: [message, fileName, data]
      properties:
        message:
          type: string
        fileName:
          type: string
          example: 'awdah-data-export-2026-03-23.json'
        data:
          type: object

    AddPracticingPeriodResponse:
      type: object
      required: [periodId]
      properties:
        periodId:
          type: string
          description: ULID of the newly created period
          example: '01HTBZ1234ABCDEFGHIJKLMNOP'

    SalahDebtResponse:
      type: object
      required:
        [totalDaysMissed, totalPrayersOwed, completedPrayers, remainingPrayers, perPrayerRemaining]
      properties:
        totalDaysMissed:
          type: integer
          minimum: 0
          description: Total number of days in gap periods since bulugh
          example: 3285
        totalPrayersOwed:
          type: integer
          minimum: 0
          description: totalDaysMissed × 5
          example: 16425
        completedPrayers:
          type: integer
          minimum: 0
          description: Total qadaa prayers already logged
          example: 730
        remainingPrayers:
          type: integer
          minimum: 0
          description: totalPrayersOwed − completedPrayers (never negative)
          example: 15695
        perPrayerRemaining:
          type: object
          description: Remaining qadaa count per prayer name (fajr, dhuhr, asr, maghrib, isha)
          additionalProperties:
            type: integer
            minimum: 0
          example:
            fajr: 3139
            dhuhr: 3139
            asr: 3139
            maghrib: 3139
            isha: 3139

    SawmDebtResponse:
      type: object
      required: [totalDaysOwed, completedDays, remainingDays]
      properties:
        totalDaysOwed:
          type: integer
          minimum: 0
          description: Total Ramadan fasting days missed across all gap periods
          example: 270
        completedDays:
          type: integer
          minimum: 0
          description: Total qadaa fasts already logged
          example: 45
        remainingDays:
          type: integer
          minimum: 0
          description: totalDaysOwed − completedDays (never negative)
          example: 225

    PrayerLogEntry:
      type: object
      required: [eventId, date, prayerName, type, loggedAt]
      properties:
        eventId:
          type: string
          description: ULID of the log entry
          example: '01HTBZ1234ABCDEFGHIJKLMNOP'
        date:
          $ref: '#/components/schemas/HijriDate'
        prayerName:
          $ref: '#/components/schemas/PrayerName'
        type:
          $ref: '#/components/schemas/LogType'
        loggedAt:
          type: string
          format: date-time
          description: ISO 8601 timestamp when the entry was created
          example: '2025-03-17T14:30:00.000Z'

    FastLogEntry:
      type: object
      required: [eventId, date, type, loggedAt]
      properties:
        eventId:
          type: string
          description: ULID of the log entry
          example: '01HTBZ1234ABCDEFGHIJKLMNOP'
        date:
          $ref: '#/components/schemas/HijriDate'
        type:
          $ref: '#/components/schemas/LogType'
        loggedAt:
          type: string
          format: date-time
          description: ISO 8601 timestamp when the entry was created
          example: '2025-03-17T14:30:00.000Z'
        breakReason:
          type: string
          description: Optional reason if the fast was broken (v1 reserved field)

    PrayerHistoryPage:
      type: object
      required: [items, hasMore]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/PrayerLogEntry'
        nextCursor:
          type: string
        hasMore:
          type: boolean

    FastHistoryPage:
      type: object
      required: [items, hasMore]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/FastLogEntry'
        nextCursor:
          type: string
        hasMore:
          type: boolean

    PracticingPeriod:
      type: object
      required: [periodId, startDate, type]
      properties:
        periodId:
          type: string
          description: ULID of the period
          example: '01HTBZ1234ABCDEFGHIJKLMNOP'
        startDate:
          $ref: '#/components/schemas/HijriDate'
        endDate:
          allOf:
            - $ref: '#/components/schemas/HijriDate'
          nullable: true
          description: Absent for open-ended periods (user is currently practicing)
        type:
          $ref: '#/components/schemas/PracticingPeriodType'

    UserSettings:
      type: object
      required: [userId, bulughDate, gender]
      properties:
        userId:
          type: string
          description: Cognito sub claim
          example: 'a1b2c3d4-e5f6-7890-abcd-ef1234567890'
        username:
          type: string
          nullable: true
          maxLength: 40
          description: Optional display name stored with the profile
        dateOfBirth:
          allOf:
            - $ref: '#/components/schemas/HijriDate'
          nullable: true
          description: Optional date of birth in Hijri
        bulughDate:
          $ref: '#/components/schemas/HijriDate'
        revertDate:
          allOf:
            - $ref: '#/components/schemas/HijriDate'
          nullable: true
          description: Optional date of reversion to Islam
        gender:
          $ref: '#/components/schemas/Gender'
        madhab:
          allOf:
            - $ref: '#/components/schemas/Madhab'
          nullable: true
        calculationMethod:
          allOf:
            - $ref: '#/components/schemas/CalculationMethod'
          nullable: true
        moonSightingPreference:
          allOf:
            - $ref: '#/components/schemas/MoonSightingPreference'
          nullable: true
        location:
          allOf:
            - $ref: '#/components/schemas/Location'
          nullable: true

    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              enum:
                - VALIDATION_ERROR
                - UNAUTHENTICATED
                - FORBIDDEN
                - NOT_FOUND
                - CONFLICT
                - INTERNAL_ERROR
            message:
              type: string
              example: 'Bulugh date cannot be before date of birth'

  responses:
    ValidationError:
      description: Request failed schema validation
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          example:
            error:
              code: VALIDATION_ERROR
              message: 'date: Date must be in YYYY-MM-DD format'

    Unauthenticated:
      description: Missing or invalid JWT
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          example:
            error:
              code: UNAUTHENTICATED
              message: 'Missing or invalid token'

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          example:
            error:
              code: NOT_FOUND
              message: 'Resource not found'

    Conflict:
      description: Request conflicts with current server state
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          example:
            error:
              code: CONFLICT
              message: 'Job has not completed yet'

    InternalError:
      description: Unexpected server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          example:
            error:
              code: INTERNAL_ERROR
              message: 'An unexpected error occurred'
