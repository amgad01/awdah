name: E2E Tests
on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  e2e:
    name: Playwright against staging
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Detect Playwright setup
        id: detect_playwright
        run: |
          if npm ls @playwright/test --depth=0 >/dev/null 2>&1; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Playwright browsers
        if: steps.detect_playwright.outputs.enabled == 'true'
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        if: steps.detect_playwright.outputs.enabled == 'true'
        run: npx playwright test

      - name: Skip message
        if: steps.detect_playwright.outputs.enabled != 'true'
        run: echo "No Playwright configuration found; skipping E2E execution."

      - name: Upload test results
        if: always() && steps.detect_playwright.outputs.enabled == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: playwright-report/
          retention-days: 7
