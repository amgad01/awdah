name: E2E Tests
on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  e2e:
    name: Playwright E2E (full stack)
    if: false # enable once infrastructure is ready
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Start full stack
        run: docker compose up -d localstack backend frontend

      - name: Wait for LocalStack
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:4566/_localstack/health | grep -Eq '"dynamodb"[[:space:]]*:[[:space:]]*"(running|available)"'; then
              sleep 5
              exit 0
            fi
            sleep 2
          done
          docker compose logs localstack
          exit 1

      - name: Wait for backend
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:3000/health >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          docker compose logs backend
          exit 1

      - name: Wait for frontend
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:8080/ >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          docker compose logs frontend
          exit 1

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests (Chromium)
        run: env E2E_BASE_URL=http://localhost:8080 npx playwright test --project=chromium
        working-directory: apps/frontend

      - name: Capture stack logs
        if: always()
        run: docker compose logs > /tmp/awdah-e2e-stack.log

      - name: Upload stack log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-stack-log-${{ github.run_id }}
          path: /tmp/awdah-e2e-stack.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: apps/frontend/playwright-report/
          retention-days: 7
