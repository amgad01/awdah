name: E2E

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: '[Internal] Source branch/ref to test. Leave blank for manual runs.'
        required: false
        type: string
      source_sha:
        description: '[Internal] Exact commit SHA to test. Leave blank for manual runs.'
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: e2e-${{ inputs.source_sha || github.sha }}
  cancel-in-progress: true

jobs:
  e2e-docker:
    name: E2E (Dev Gate)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tested commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          ref: ${{ inputs.source_sha || github.sha }}

      - name: Setup and install dependencies
        uses: ./.github/actions/setup-and-build
        with:
          skip-checkout: 'true'
          build-shared: 'false'

      - name: Start Awdah Stack (Docker)
        run: docker compose up -d localstack backend frontend

      - name: Wait for services
        run: |
          # Wait for LocalStack
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:4566/_localstack/health | grep -Eq '"dynamodb"[[:space:]]*:[[:space:]]*"(running|available)"'; then
              break
            fi
            sleep 2
          done
          # Wait for Backend
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:3000/health >/dev/null 2>&1; then
              break
            fi
            sleep 2
          done

      - name: Seed E2E users
        run: |
          curl -fsS -X POST http://localhost:3000/v1/e2e/seed \
            -H 'Content-Type: application/json' \
            -d '{
              "users": [
                {"email": "history@example.com"},
                {"email": "settings@example.com"},
                {"email": "tracker@example.com"}
              ]
            }'

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E Tests
        run: npx playwright test --project=chromium
        working-directory: apps/frontend
        env:
          E2E_BASE_URL: http://localhost:8080

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-e2e-artifacts-${{ github.run_id }}
          path: |
            apps/frontend/playwright-report
            apps/frontend/test-results
          if-no-files-found: ignore
          retention-days: 7

      - name: Cleanup
        if: always()
        run: docker compose down
