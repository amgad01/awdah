name: Deploy Backend

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Optional semver override for manual runs (example: v1.1.0)'
        required: false
  workflow_run:
    workflows: ['E2E']
    types:
      - completed
    branches:
      - 'release/**'

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-backend-${{ github.event.workflow_run.head_sha || github.sha }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare backend release context
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_repository.full_name == github.repository && startsWith(github.event.workflow_run.head_branch, 'release/')) }}
    outputs:
      source_ref: ${{ steps.context.outputs.source_ref }}
      source_sha: ${{ steps.context.outputs.source_sha }}
      release_tag: ${{ steps.context.outputs.release_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve source ref, SHA, and release tag
        id: context
        shell: bash
        run: |
          set -euo pipefail

          semver_pattern='^v[0-9]+\.[0-9]+\.[0-9]+$'
          release_branch_pattern='^release/(v[0-9]+\.[0-9]+\.[0-9]+)([-/].*)?$'
          input_release_tag='${{ github.event.inputs.release_tag }}'

          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            source_ref='${{ github.event.workflow_run.head_branch }}'
            git fetch origin "$source_ref" --depth=1
            source_sha="$(git rev-parse "origin/$source_ref")"
          else
            source_ref='${{ github.ref_name }}'
            source_sha='${{ github.sha }}'
          fi

          if [ -n "$input_release_tag" ]; then
            if ! printf '%s' "$input_release_tag" | grep -Eq "$semver_pattern"; then
              echo "Invalid manual release_tag '$input_release_tag'. Expected format vX.Y.Z" >&2
              exit 1
            fi
            release_tag="$input_release_tag"
          elif [[ "$source_ref" =~ $release_branch_pattern ]]; then
            release_tag="${BASH_REMATCH[1]}"
          else
            echo "Could not derive release tag from branch '$source_ref'. Provide workflow input release_tag (vX.Y.Z)." >&2
            exit 1
          fi

          {
            echo "source_ref=$source_ref"
            echo "source_sha=$source_sha"
            echo "release_tag=$release_tag"
          } >> "$GITHUB_OUTPUT"

  approve:
    name: 'Approve: ${{ needs.prepare.outputs.release_tag }} @ ${{ needs.prepare.outputs.source_sha }}'
    runs-on: ubuntu-latest
    needs: prepare
    environment: prod
    steps:
      - name: Approval granted
        run: echo "Approved backend deploy"

  deploy:
    name: CDK Deploy (prod)
    runs-on: ubuntu-latest
    needs: [prepare, approve]
    env:
      TARGET_ENV: prod
      AWS_DEFAULT_REGION: ${{ vars.AWS_DEFAULT_REGION }}
      RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
    steps:
      - name: Checkout release commit
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.source_sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build shared
        run: npm run build --workspace=packages/shared

      - name: Build infra
        run: cd infra && npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_DEFAULT_REGION }}

      - name: CDK deploy
        run: |
          cd infra
          CONTEXT_ARGS=(--context env=prod --context "releaseTag=$RELEASE_TAG")
          npx cdk deploy \
            Awdah-data-stack-prod \
            Awdah-auth-stack-prod \
            Awdah-api-stack-prod \
            Awdah-backup-stack-prod \
            Awdah-alarm-stack-prod \
            "${CONTEXT_ARGS[@]}" \
            --require-approval never

      - name: Smoke test deployed API
        run: |
          api_url=$(aws ssm get-parameter --name /awdah/prod/api/url --query 'Parameter.Value' --output text)
          health_body=$(curl --fail --silent --show-error --retry 6 --retry-all-errors "${api_url}/health")
          printf '%s' "$health_body" | grep -q '"status":"UP"'

          protected_status=$(curl --silent --show-error --output /tmp/protected-route.json --write-out '%{http_code}' "${api_url}/v1/user/profile")
          test "$protected_status" = "401"
