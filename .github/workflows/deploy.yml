name: Deploy Backend

on:
  workflow_dispatch:
    inputs:
      confirm_branch_release_tag:
        description: 'Check this to deploy with the version parsed from the selected release/* branch. Leave unchecked only if you fill in release_tag.'
        required: false
        type: boolean
        default: false
      release_tag:
        description: 'Optional semver override for manual runs (example: v1.1.1)'
        required: false
        type: string
      source_ref:
        description: '[Internal] Source branch/ref to deploy. Leave blank for manual runs.'
        required: false
        type: string
      source_sha:
        description: '[Internal] Exact commit SHA to deploy. Leave blank for manual runs.'
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: deploy-backend-${{ inputs.source_sha || github.sha }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare backend release context
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      source_ref: ${{ steps.context.outputs.source_ref }}
      source_sha: ${{ steps.context.outputs.source_sha }}
      release_tag: ${{ steps.context.outputs.release_tag }}
    steps:
      - name: Checkout release workflow code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          ref: ${{ inputs.source_sha || github.sha }}

      - name: Resolve source ref, SHA, and release tag
        id: context
        uses: ./.github/actions/prepare-release
        with:
          confirm-branch-release-tag: ${{ inputs.confirm_branch_release_tag }}
          release-tag-input: ${{ inputs.release_tag || '' }}
          source-ref: ${{ inputs.source_ref || github.ref_name }}
          source-sha: ${{ inputs.source_sha || github.sha }}
          require-branch-release-tag-confirmation: ${{ github.event_name == 'workflow_dispatch' && 'true' || 'false' }}

  approve:
    name: 'Approve: ${{ needs.prepare.outputs.release_tag }} @ ${{ needs.prepare.outputs.source_sha }}'
    runs-on: ubuntu-latest
    needs: prepare
    environment: prod
    steps:
      - name: Approval granted
        run: echo "Approved backend deploy"

  deploy:
    name: CDK Deploy (prod)
    runs-on: ubuntu-latest
    needs: [prepare, approve]
    environment: prod
    permissions:
      contents: read
      id-token: write
    env:
      TARGET_ENV: prod
      AWS_DEFAULT_REGION: ${{ vars.AWS_DEFAULT_REGION }}
      RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
    steps:
      - name: Checkout release commit
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.source_sha }}
          fetch-depth: 1

      - name: Setup and build
        uses: ./.github/actions/setup-and-build
        with:
          skip-checkout: 'true'

      - name: Build infra
        run: cd infra && npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_DEFAULT_REGION }}

      - name: CDK deploy
        run: |
          cd infra
          CONTEXT_ARGS=(--context env=prod --context "releaseTag=$RELEASE_TAG")
          npx cdk deploy \
            Awdah-data-stack-prod \
            Awdah-auth-stack-prod \
            Awdah-api-stack-prod \
            Awdah-backup-stack-prod \
            Awdah-alarm-stack-prod \
            "${CONTEXT_ARGS[@]}" \
            --require-approval never

      - name: Smoke test deployed API
        run: |
          api_url=$(aws ssm get-parameter --name /awdah/prod/api/url --query 'Parameter.Value' --output text)
          health_body=$(curl --fail --silent --show-error --retry 6 --retry-all-errors "${api_url}/health")
          printf '%s' "$health_body" | grep -q '"status":"UP"'

          protected_status=$(curl --silent --show-error --output /tmp/protected-route.json --write-out '%{http_code}' "${api_url}/v1/user/profile")
          test "$protected_status" = "401"
