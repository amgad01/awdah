name: Deploy Backend

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Optional semver override. Leave blank to use the selected release/vX.Y.Z-* branch version.'
        required: false
  workflow_run:
    workflows: ['E2E']
    types:
      - completed
    branches:
      - 'release/**'

permissions:
  contents: read
  id-token: write

# Scoped to the triggering commit so parallel release branches never block each other,
# and required-check status is always tied to the specific commit being deployed.
concurrency:
  group: deploy-backend-${{ github.event.workflow_run.head_sha || github.sha }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare backend release context
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_repository.full_name == github.repository) }}
    outputs:
      source_ref: ${{ steps.release_context.outputs.source_ref }}
      source_sha: ${{ steps.release_context.outputs.source_sha }}
      release_tag: ${{ steps.release_context.outputs.release_tag }}
      release_tag_source: ${{ steps.release_context.outputs.release_tag_source }}
    steps:
      - name: Checkout for local action access
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Prepare release
        id: release_context
        uses: ./.github/actions/prepare-release
        with:
          release-tag-input: ${{ github.event.inputs.release_tag }}
          workflow-head-branch: ${{ github.event.workflow_run.head_branch }}
          workflow-head-sha: ${{ github.event.workflow_run.head_sha }}

  # Dedicated approval gate job. Runs after prepare has resolved the release context,
  # so its name — shown in the GitHub environment approval dialog — contains the actual
  # tag and SHA. Move the 'prod' environment protection rule here (remove it from deploy).
  # The reviewer sees exactly what they are approving before clicking Approve.
  approve:
    name: 'Approve: ${{ needs.prepare.outputs.release_tag }} @ ${{ needs.prepare.outputs.source_sha }}'
    runs-on: ubuntu-latest
    needs: prepare
    environment: prod
    steps:
      - name: Approval granted
        run: |
          echo "Approved: ${{ needs.prepare.outputs.release_tag }} @ ${{ needs.prepare.outputs.source_sha }}"

  deploy:
    name: CDK Deploy (prod)
    runs-on: ubuntu-latest
    needs: [prepare, approve]
    env:
      TARGET_ENV: prod
      AWS_DEFAULT_REGION: ${{ vars.AWS_DEFAULT_REGION }}
      RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
    steps:
      - name: Checkout for local action access
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup and build
        uses: ./.github/actions/setup-and-build
        with:
          ref: ${{ needs.prepare.outputs.source_sha }}
          fetch-depth: 0

      - name: Build infra
        run: cd infra && npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_DEFAULT_REGION }}

      - name: CDK deploy
        run: |
          cd infra
          CONTEXT_ARGS=(--context env=prod)
          [ -n "$RELEASE_TAG" ] && CONTEXT_ARGS+=(--context "releaseTag=$RELEASE_TAG")
          npx cdk deploy \
            Awdah-data-stack-prod \
            Awdah-auth-stack-prod \
            Awdah-api-stack-prod \
            Awdah-backup-stack-prod \
            Awdah-alarm-stack-prod \
            "${CONTEXT_ARGS[@]}" \
            --require-approval never

      - name: Smoke test deployed API
        run: |
          api_url=$(aws ssm get-parameter --name /awdah/prod/api/url --query 'Parameter.Value' --output text)
          health_body=$(curl --fail --silent --show-error --retry 6 --retry-all-errors "${api_url}/health")
          printf '%s' "$health_body" | grep -q '"status":"UP"'

          protected_status=$(curl --silent --show-error --output /tmp/protected-route.json --write-out '%{http_code}' "${api_url}/v1/user/profile")
          test "$protected_status" = "401"