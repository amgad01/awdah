name: Deploy Backend

on:
  workflow_dispatch:
  workflow_run:
    workflows: ['E2E']
    types:
      - completed

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: CDK Deploy (prod)
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' && github.event.workflow_run.head_repository.full_name == github.repository) }}
    environment: prod
    env:
      TARGET_ENV: prod
      AWS_DEFAULT_REGION: ${{ vars.AWS_DEFAULT_REGION }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build shared
        run: npm run build --workspace=packages/shared

      - name: Build infra
        run: cd infra && npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_DEFAULT_REGION }}

      - name: Determine release tag
        id: release_tag
        run: |
          git fetch --tags --force
          tag=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n 1)
          echo "release_tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: CDK deploy
        run: |
          cd infra
          CONTEXT_ARGS=(--context env=prod)
          [ -n "${{ steps.release_tag.outputs.release_tag }}" ] && \
            CONTEXT_ARGS+=(--context "releaseTag=${{ steps.release_tag.outputs.release_tag }}")
          npx cdk deploy \
            Awdah-data-stack-prod \
            Awdah-auth-stack-prod \
            Awdah-api-stack-prod \
            Awdah-backup-stack-prod \
            Awdah-alarm-stack-prod \
            "${CONTEXT_ARGS[@]}" \
            --require-approval never

      - name: Smoke test deployed API
        run: |
          api_url=$(aws ssm get-parameter --name /awdah/prod/api/url --query 'Parameter.Value' --output text)
          health_body=$(curl --fail --silent --show-error --retry 6 --retry-all-errors "${api_url}/health")
          printf '%s' "$health_body" | grep -q '"status":"UP"'

          protected_status=$(curl --silent --show-error --output /tmp/protected-route.json --write-out '%{http_code}' "${api_url}/v1/user/profile")
          test "$protected_status" = "401"
