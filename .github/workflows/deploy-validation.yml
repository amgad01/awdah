name: Deploy Validation

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: deploy-validation-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate-backend-deploy:
    name: Validate Backend Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout for local action access
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup and build
        uses: ./.github/actions/setup-and-build
        with:
          skip-checkout: 'true'
          build-backend-layer: 'true'

      - name: Build infra
        run: cd infra && npm run build

      - name: CDK synth (validate templates)
        run: |
          cd infra
          npx cdk synth \
            Awdah-data-stack-prod \
            Awdah-auth-stack-prod \
            Awdah-api-stack-prod \
            Awdah-backup-stack-prod \
            Awdah-alarm-stack-prod \
            --context env=prod

      - name: Check CDK diff (dry-run)
        run: |
          cd infra
          npx cdk diff \
            Awdah-data-stack-prod \
            Awdah-auth-stack-prod \
            Awdah-api-stack-prod \
            Awdah-backup-stack-prod \
            Awdah-alarm-stack-prod \
            --context env=prod || true

  validate-pages-deploy:
    name: Validate Pages Deploy
    runs-on: ubuntu-latest
    needs: validate-backend-deploy
    steps:
      - name: Checkout for local action access
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup and build
        uses: ./.github/actions/setup-and-build
        with:
          skip-checkout: 'true'

      - name: Build frontend for GitHub Pages
        run: ./scripts/deploy/build-frontend.sh prod
        env:
          VITE_AUTH_MODE: cognito
          VITE_AWS_REGION: eu-west-1
          VITE_API_BASE_URL: https://validation.invalid
          VITE_COGNITO_USER_POOL_ID: validation-user-pool
          VITE_COGNITO_CLIENT_ID: validation-client
          VITE_APP_VERSION: pr-${{ github.event.pull_request.number }}
          VITE_APP_RELEASE_TAG: pr-${{ github.event.pull_request.number }}
          VITE_APP_EMAIL: validation@example.invalid
          PAGES_BASE_PATH: /awdah/
          PAGES_ORIGIN: https://amgad01.github.io
          PAGES_SITE_URL: https://amgad01.github.io/awdah/
          SKIP_SHARED_BUILD: '1'

      - name: Verify Pages bundle paths
        run: ./scripts/ci/verify-pages-dist.sh apps/frontend/dist https://amgad01.github.io/awdah/ /awdah/

      - name: Upload build artifact (for inspection)
        uses: actions/upload-artifact@v4
        with:
          name: pages-build-pr-${{ github.event.pull_request.number }}
          path: apps/frontend/dist
          retention-days: 1
