name: Dockerized E2E

on:
  workflow_dispatch:
  workflow_run:
    workflows: ['CI']
    types:
      - completed

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.event.workflow_run.head_branch || github.ref }}
  cancel-in-progress: true

jobs:
  e2e-docker:
    name: Dockerized E2E (Dev Gate)
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Start Awdah Stack (Docker)
        run: docker compose up -d localstack backend frontend

      - name: Wait for services
        run: |
          # Wait for LocalStack
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:4566/_localstack/health | grep -Eq '"dynamodb"[[:space:]]*:[[:space:]]*"(running|available)"'; then
              break
            fi
            sleep 2
          done
          # Wait for Backend
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:3000/health >/dev/null 2>&1; then
              break
            fi
            sleep 2
          done

      - name: Seed E2E users
        run: |
          curl -fsS -X POST http://localhost:3000/v1/e2e/seed \
            -H 'Content-Type: application/json' \
            -d '{
              "users": [
                {"email": "history@example.com"},
                {"email": "settings@example.com"},
                {"email": "tracker@example.com"}
              ]
            }'

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E Tests
        run: npx playwright test --project=chromium
        working-directory: apps/frontend
        env:
          E2E_BASE_URL: http://localhost:8080

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-e2e-artifacts-${{ github.run_id }}
          path: |
            apps/frontend/playwright-report
            apps/frontend/test-results
          if-no-files-found: ignore
          retention-days: 7

      - name: Cleanup
        if: always()
        run: docker compose down
