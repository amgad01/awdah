name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, Typecheck, Build, Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build shared
        run: npm run build --workspace=packages/shared

      - name: ESLint
        run: npm run lint

      - name: Prettier
        run: npm run format:check

      - name: TypeScript (root)
        run: npm run typecheck

      - name: TypeScript (backend)
        run: npm run typecheck --workspace=apps/backend

      - name: TypeScript (shared)
        run: npm run typecheck --workspace=packages/shared

      - name: Build backend
        run: npm run build --workspace=apps/backend

      - name: Build infra
        run: npm run build --workspace=infra

      - name: Test (backend)
        run: npm run test --workspace=apps/backend

      - name: Test (shared)
        run: npm run test --workspace=packages/shared --if-present

      - name: Security audit
        run: npm audit --audit-level=high --workspace=apps/backend --workspace=packages/shared --workspace=infra
