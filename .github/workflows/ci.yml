name: CI

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, Typecheck, Build, Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build shared
        run: npm run build --workspace=packages/shared

      - name: ESLint
        run: npm run lint

      - name: ESLint (frontend)
        run: npm run lint --workspace=apps/frontend

      - name: Prettier
        run: npm run format:check

      - name: TypeScript (root)
        run: npm run typecheck

      - name: TypeScript (backend)
        run: npm run typecheck --workspace=apps/backend

      - name: TypeScript (shared)
        run: npm run typecheck --workspace=packages/shared

      - name: TypeScript (frontend)
        run: npm run typecheck --workspace=apps/frontend

      - name: Build backend
        run: npm run build --workspace=apps/backend

      - name: Build frontend
        run: npm run build --workspace=apps/frontend

      - name: Check Pages build
        run: npm run check:pages

      - name: Build infra
        run: npm run build --workspace=infra

      - name: Test (backend)
        run: npm run test:coverage --workspace=apps/backend

      - name: Test (frontend)
        run: npm run test --workspace=apps/frontend

      - name: Test (shared)
        run: npm run test --workspace=packages/shared --if-present

      - name: Security audit
        run: npm audit --audit-level=high --workspace=apps/backend --workspace=apps/frontend --workspace=packages/shared --workspace=infra

  release-e2e:
    name: E2E (Release Gate)
    if: ${{ github.event_name == 'push' && startsWith(github.ref_name, 'release/') }}
    needs: quality
    uses: ./.github/workflows/e2e.yml
    with:
      source_ref: ${{ github.ref_name }}
      source_sha: ${{ github.sha }}

  release-backend:
    name: Deploy Backend (Release)
    if: ${{ github.event_name == 'push' && startsWith(github.ref_name, 'release/') }}
    needs: release-e2e
    permissions:
      contents: read
      id-token: write
    secrets: inherit
    uses: ./.github/workflows/deploy.yml
    with:
      confirm_branch_release_tag: true
      release_tag: ''
      source_ref: ${{ github.ref_name }}
      source_sha: ${{ github.sha }}

  release-pages:
    name: Deploy Pages (Release)
    if: ${{ github.event_name == 'push' && startsWith(github.ref_name, 'release/') }}
    needs: release-backend
    permissions:
      contents: write
      pages: write
      id-token: write
    secrets: inherit
    uses: ./.github/workflows/deploy-pages.yml
    with:
      confirm_branch_release_tag: true
      release_tag: ''
      release_tagger_name: ''
      release_tagger_email: ''
      source_ref: ${{ github.ref_name }}
      source_sha: ${{ github.sha }}
