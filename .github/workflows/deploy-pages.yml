name: Deploy to GitHub Pages

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Optional semver override for manual runs (example: v1.1.0)'
        required: false
      release_tagger_name:
        description: 'Optional Git tagger name to use for the release tag'
        required: false
      release_tagger_email:
        description: 'Optional Git tagger email to use for the release tag'
        required: false
  workflow_run:
    workflows: ['Deploy Backend']
    types:
      - completed
    branches:
      - 'release/**'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: deploy-pages-${{ github.event.workflow_run.head_sha || github.sha }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare pages release context
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_repository.full_name == github.repository && startsWith(github.event.workflow_run.head_branch, 'release/')) }}
    outputs:
      source_ref: ${{ steps.context.outputs.source_ref }}
      source_sha: ${{ steps.context.outputs.source_sha }}
      release_tag: ${{ steps.context.outputs.release_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve source ref, SHA, and release tag
        id: context
        shell: bash
        run: |
          set -euo pipefail

          semver_pattern='^v[0-9]+\.[0-9]+\.[0-9]+$'
          release_branch_pattern='^release/(v[0-9]+\.[0-9]+\.[0-9]+)([-/].*)?$'
          input_release_tag='${{ github.event.inputs.release_tag }}'

          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            source_ref='${{ github.event.workflow_run.head_branch }}'
            git fetch origin "$source_ref" --depth=1
            source_sha="$(git rev-parse "origin/$source_ref")"
          else
            source_ref='${{ github.ref_name }}'
            source_sha='${{ github.sha }}'
          fi

          if [ -n "$input_release_tag" ]; then
            if ! printf '%s' "$input_release_tag" | grep -Eq "$semver_pattern"; then
              echo "Invalid manual release_tag '$input_release_tag'. Expected format vX.Y.Z" >&2
              exit 1
            fi
            release_tag="$input_release_tag"
          elif [[ "$source_ref" =~ $release_branch_pattern ]]; then
            release_tag="${BASH_REMATCH[1]}"
          else
            echo "Could not derive release tag from branch '$source_ref'. Provide workflow input release_tag (vX.Y.Z)." >&2
            exit 1
          fi

          {
            echo "source_ref=$source_ref"
            echo "source_sha=$source_sha"
            echo "release_tag=$release_tag"
          } >> "$GITHUB_OUTPUT"

  approve:
    name: 'Approve: ${{ needs.prepare.outputs.release_tag }} @ ${{ needs.prepare.outputs.source_sha }}'
    runs-on: ubuntu-latest
    needs: prepare
    environment: github-pages
    steps:
      - name: Approval granted
        run: echo "Approved pages deploy"

  deploy:
    name: Build and deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: [prepare, approve]
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
      SOURCE_SHA: ${{ needs.prepare.outputs.source_sha }}
      AWS_DEFAULT_REGION: eu-west-1
      PAGES_ORIGIN: https://amgad01.github.io
      PAGES_CNAME: ''

    steps:
      - name: Checkout release commit
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.source_sha }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build shared package
        run: npm run build --workspace=packages/shared

      - name: Create and push release tag
        run: |
          tagger_name='${{ github.event.inputs.release_tagger_name }}'
          tagger_email='${{ github.event.inputs.release_tagger_email }}'

          if [ -z "$tagger_name" ]; then
            tagger_name='github-actions[bot]'
          fi

          if [ -z "$tagger_email" ]; then
            tagger_email='github-actions[bot]@users.noreply.github.com'
          fi

          git config user.name "$tagger_name"
          git config user.email "$tagger_email"

          if git rev-parse --verify --quiet "refs/tags/$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Tag $RELEASE_TAG already exists locally."
          else
            git tag -a "$RELEASE_TAG" "$SOURCE_SHA" -m "GitHub Pages release $RELEASE_TAG"
          fi

          if git ls-remote --tags origin | grep -Fq "refs/tags/${RELEASE_TAG}"; then
            echo "Tag $RELEASE_TAG already exists on origin."
          else
            git push origin "$RELEASE_TAG"
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_DEFAULT_REGION }}

      - name: Build frontend for GitHub Pages
        run: ./scripts/build-frontend.sh prod
        env:
          VITE_AUTH_MODE: cognito
          VITE_AWS_REGION: ${{ env.AWS_DEFAULT_REGION }}
          VITE_APP_VERSION: ${{ needs.prepare.outputs.release_tag }}
          VITE_APP_RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
          VITE_APP_EMAIL: ${{ secrets.VITE_APP_EMAIL }}
          PAGES_BASE_PATH: /awdah/
          PAGES_ORIGIN: ${{ env.PAGES_ORIGIN }}
          PAGES_SITE_URL: https://amgad01.github.io/awdah/
          PAGES_CNAME: ${{ env.PAGES_CNAME }}
          SKIP_SHARED_BUILD: '1'

      - name: Verify Pages bundle paths
        run: ./scripts/verify-pages-dist.sh apps/frontend/dist https://amgad01.github.io/awdah/ /awdah/

      - name: Configure Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/frontend/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.release_tag }}
          name: Awdah ${{ needs.prepare.outputs.release_tag }}
          target_commitish: ${{ needs.prepare.outputs.source_sha }}
          generate_release_notes: true
          make_latest: true

      - name: Smoke test deployed Pages site
        run: |
          expected_url="https://amgad01.github.io/awdah/"
          page_url="${{ steps.deployment.outputs.page_url }}"

          case "$page_url" in
            "$expected_url"|"$expected_url"*)
              ;;
            *)
              echo "Unexpected GitHub Pages URL: $page_url"
              exit 1
              ;;
          esac

          body=$(curl --fail --silent --show-error --location --retry 6 --retry-all-errors "$expected_url")
          printf '%s' "$body" | grep -q 'Awdah'
          printf '%s' "$body" | grep -q '/awdah/assets/'
          printf '%s' "$body" | grep -q 'https://amgad01.github.io/awdah/'
