name: Deploy to GitHub Pages

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment (pages deployments are always public)'
        required: false
        default: 'pages'
      release_tag:
        description: 'Optional semver override. Leave blank to use the selected release/vX.Y.Z-* branch version.'
        required: false
      release_tagger_name:
        description: 'Optional Git tagger name to use for the release tag'
        required: false
      release_tagger_email:
        description: 'Optional Git tagger email to use for the release tag'
        required: false
  workflow_run:
    workflows: ['E2E']          # Same 1-hop source as Deploy Backend — preserves head_branch/head_sha
    types:
      - completed
    branches:
      - 'release/**'

permissions:
  contents: write
  pages: write
  id-token: write

# Scoped to the triggering commit — same strategy as deploy.yml.
# Pages deployments must not cancel each other (cancel-in-progress: false) because
# a partially-uploaded Pages artifact leaves the site in a broken state.
concurrency:
  group: deploy-pages-${{ github.event.workflow_run.head_sha || github.sha }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare Pages release context
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_repository.full_name == github.repository) }}
    outputs:
      source_ref: ${{ steps.release_context.outputs.source_ref }}
      source_sha: ${{ steps.release_context.outputs.source_sha }}
      release_tag: ${{ steps.release_context.outputs.release_tag }}
      release_tag_source: ${{ steps.release_context.outputs.release_tag_source }}
    steps:
      - name: Checkout for local action access
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Prepare release
        id: release_context
        uses: ./.github/actions/prepare-release
        with:
          release-tag-input: ${{ github.event.inputs.release_tag }}
          workflow-head-branch: ${{ github.event.workflow_run.head_branch }}
          workflow-head-sha: ${{ github.event.workflow_run.head_sha }}

      - name: Wait for Deploy Backend to succeed on this commit
        # Skipped on manual dispatch — caller is responsible for ensuring backend is live.
        if: ${{ github.event_name != 'workflow_dispatch' }}
        env:
          GH_TOKEN: ${{ github.token }}
          SOURCE_SHA: ${{ steps.release_context.outputs.source_sha }}
        run: |
          echo "Waiting for Deploy Backend (deploy.yml) to succeed on commit $SOURCE_SHA..."

          for i in $(seq 1 30); do
            # --commit does not work for workflow_run-triggered workflows because GitHub
            # indexes runs by the SHA that directly triggered them, not the release commit.
            # We fetch the last 20 runs and filter by headSha in jq instead.
            # Both Deploy Backend and Deploy Pages are triggered by the same E2E run, so
            # their headSha values are identical — this filter is commit-specific.
            conclusion=$(gh run list \
              --repo "$GITHUB_REPOSITORY" \
              --workflow="deploy.yml" \
              --limit 20 \
              --json headSha,conclusion,status \
              --jq --arg sha "$SOURCE_SHA" \
                'map(select(.headSha == $sha)) | .[0] | .conclusion // .status // ""')

            echo "Attempt $i/30: conclusion=${conclusion:-not_found}"

            if [ "$conclusion" = "success" ]; then
              echo "Deploy Backend succeeded on $SOURCE_SHA. Proceeding with Pages deploy."
              exit 0
            elif [ "$conclusion" = "failure" ] || [ "$conclusion" = "cancelled" ]; then
              echo "Deploy Backend failed or was cancelled on $SOURCE_SHA. Aborting Pages deploy." >&2
              exit 1
            fi
            # conclusion is blank, "in_progress", "queued", or "waiting" — keep polling
            sleep 20
          done

          echo "Timed out (10 min) waiting for Deploy Backend on $SOURCE_SHA." >&2
          exit 1

  # Dedicated approval gate job. Runs after prepare and the backend gate have both passed,
  # so its name — shown in the GitHub environment approval dialog — contains the actual
  # tag and SHA. Move the 'github-pages' environment protection rule here (remove it from deploy).
  approve:
    name: 'Approve: ${{ needs.prepare.outputs.release_tag }} @ ${{ needs.prepare.outputs.source_sha }}'
    runs-on: ubuntu-latest
    needs: prepare
    environment: github-pages
    steps:
      - name: Approval granted
        run: |
          echo "Approved: ${{ needs.prepare.outputs.release_tag }} @ ${{ needs.prepare.outputs.source_sha }}"

  deploy:
    name: Build and deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: [prepare, approve]
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
      SOURCE_SHA: ${{ needs.prepare.outputs.source_sha }}
      AWS_DEFAULT_REGION: eu-west-1
      PAGES_ORIGIN: https://amgad01.github.io
      PAGES_CNAME: ''

    steps:
      - name: Checkout for local action access
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup and build
        uses: ./.github/actions/setup-and-build
        with:
          ref: ${{ needs.prepare.outputs.source_sha }}
          fetch-depth: 0
          skip-checkout: 'true'

      - name: Create and push release tag
        run: |
          tagger_name='${{ github.event.inputs.release_tagger_name }}'
          tagger_email='${{ github.event.inputs.release_tagger_email }}'

          if [ -z "$tagger_name" ]; then
            tagger_name='github-actions[bot]'
          fi

          if [ -z "$tagger_email" ]; then
            tagger_email='github-actions[bot]@users.noreply.github.com'
          fi

          git config user.name "$tagger_name"
          git config user.email "$tagger_email"

          if git rev-parse --verify --quiet "refs/tags/$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Tag $RELEASE_TAG already exists locally."
          else
            git tag -a "$RELEASE_TAG" "$SOURCE_SHA" -m "GitHub Pages release $RELEASE_TAG"
          fi

          if git ls-remote --tags origin | grep -Fq "refs/tags/${RELEASE_TAG}"; then
            echo "Tag $RELEASE_TAG already exists on origin."
          else
            git push origin "$RELEASE_TAG"
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_DEFAULT_REGION }}

      - name: Build frontend for GitHub Pages
        run: ./scripts/build-frontend.sh prod
        env:
          VITE_AUTH_MODE: cognito
          VITE_AWS_REGION: ${{ env.AWS_DEFAULT_REGION }}
          VITE_APP_VERSION: ${{ needs.prepare.outputs.release_tag }}
          VITE_APP_RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
          VITE_APP_EMAIL: ${{ secrets.VITE_APP_EMAIL }}
          PAGES_BASE_PATH: /awdah/
          PAGES_ORIGIN: ${{ env.PAGES_ORIGIN }}
          PAGES_SITE_URL: https://amgad01.github.io/awdah/
          PAGES_CNAME: ${{ env.PAGES_CNAME }}
          SKIP_SHARED_BUILD: '1'

      - name: Verify Pages bundle paths
        run: ./scripts/verify-pages-dist.sh apps/frontend/dist https://amgad01.github.io/awdah/ /awdah/

      - name: Configure Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/frontend/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.release_tag }}
          name: Awdah ${{ needs.prepare.outputs.release_tag }}
          target_commitish: ${{ needs.prepare.outputs.source_sha }}
          generate_release_notes: true
          make_latest: true

      - name: Smoke test deployed Pages site
        run: |
          expected_url="https://amgad01.github.io/awdah/"
          page_url="${{ steps.deployment.outputs.page_url }}"

          case "$page_url" in
            "$expected_url"|"$expected_url"*)
              ;;
            *)
              echo "Unexpected GitHub Pages URL: $page_url"
              exit 1
              ;;
          esac

          ./scripts/smoke-test-pages.sh "$expected_url"