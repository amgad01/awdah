name: Deploy to GitHub Pages

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment (pages deployments are always public)'
        required: false
        default: 'pages'
  workflow_run:
    workflows: ['Deploy Backend']
    types:
      - completed

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: deploy-pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and deploy to GitHub Pages
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build shared package
        run: npm run build --workspace=packages/shared

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_DEFAULT_REGION || 'eu-west-1' }}

      - name: Build frontend for GitHub Pages
        run: ./scripts/build-frontend.sh prod
        env:
          VITE_AUTH_MODE: cognito
          VITE_AWS_REGION: ${{ vars.AWS_DEFAULT_REGION || 'eu-west-1' }}
          VITE_APP_VERSION: ${{ github.sha }}
          VITE_APP_EMAIL: ${{ secrets.VITE_APP_EMAIL }}
          PAGES_BASE_PATH: ${{ vars.PAGES_BASE_PATH || '/awdah/' }}
          PAGES_ORIGIN: ${{ vars.PAGES_ORIGIN || 'https://amgad01.github.io' }}
          PAGES_SITE_URL: ${{ vars.PAGES_SITE_URL || 'https://amgad01.github.io/awdah/' }}
          PAGES_CNAME: ${{ vars.PAGES_CNAME }}
          SKIP_SHARED_BUILD: '1'

      - name: Configure Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/frontend/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
