name: Deploy to GitHub Pages

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment (pages deployments are always public)'
        required: false
        default: 'pages'
      release_tag:
        description: 'Optional semver tag override (example: v1.2.3)'
        required: false
      release_tagger_name:
        description: 'Optional Git tagger name to use for the release tag'
        required: false
      release_tagger_email:
        description: 'Optional Git tagger email to use for the release tag'
        required: false
  workflow_run:
    workflows: ['Deploy Backend']
    types:
      - completed

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: deploy-pages
  cancel-in-progress: false

env:
  # The version tag created on the very first pipeline run (when no git tags exist).
  # Change this before the initial release if you want a different starting version.
  DEFAULT_FIRST_VERSION: v1.0.0

jobs:
  deploy:
    name: Build and deploy to GitHub Pages
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_repository.full_name == github.repository) }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Determine release tag
        id: release_tag
        run: |
          git fetch --tags --force

          input_tag='${{ github.event.inputs.release_tag }}'
          semver_pattern='^v[0-9]+\.[0-9]+\.[0-9]+$'

          if [ -n "$input_tag" ]; then
            if ! printf '%s' "$input_tag" | grep -Eq "$semver_pattern"; then
              echo "Invalid release_tag '$input_tag'. Expected format vX.Y.Z" >&2
              exit 1
            fi
            release_tag="$input_tag"
          else
            latest_tag=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n 1)

            if [ -z "$latest_tag" ]; then
              release_tag="${DEFAULT_FIRST_VERSION}"
            else
              major=${latest_tag#v}
              major=${major%%.*}

              rest=${latest_tag#v${major}.}
              minor=${rest%%.*}

              patch=${latest_tag##*.}
              next_patch=$((patch + 1))

              release_tag="v${major}.${minor}.${next_patch}"
            fi
          fi

          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"
          echo "RELEASE_TAG=$release_tag" >> "$GITHUB_ENV"

      - name: Create and push release tag
        run: |
          tagger_name='${{ github.event.inputs.release_tagger_name }}'
          tagger_email='${{ github.event.inputs.release_tagger_email }}'

          if [ -z "$tagger_name" ]; then
            tagger_name='github-actions[bot]'
          fi

          if [ -z "$tagger_email" ]; then
            tagger_email='github-actions[bot]@users.noreply.github.com'
          fi

          git config user.name "$tagger_name"
          git config user.email "$tagger_email"

          if git rev-parse --verify --quiet "refs/tags/$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Tag $RELEASE_TAG already exists locally."
          else
            git tag -a "$RELEASE_TAG" "$GITHUB_SHA" -m "GitHub Pages release $RELEASE_TAG"
          fi

          if git ls-remote --tags origin | grep -Fq "refs/tags/${RELEASE_TAG}"; then
            echo "Tag $RELEASE_TAG already exists on origin."
          else
            git push origin "$RELEASE_TAG"
          fi

      - name: Build shared package
        run: npm run build --workspace=packages/shared

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_DEFAULT_REGION || 'eu-west-1' }}

      - name: Build frontend for GitHub Pages
        run: ./scripts/build-frontend.sh prod
        env:
          VITE_AUTH_MODE: cognito
          VITE_AWS_REGION: ${{ vars.AWS_DEFAULT_REGION || 'eu-west-1' }}
          VITE_APP_VERSION: ${{ steps.release_tag.outputs.release_tag }}
          VITE_APP_RELEASE_TAG: ${{ steps.release_tag.outputs.release_tag }}
          VITE_APP_EMAIL: ${{ secrets.VITE_APP_EMAIL }}
          PAGES_BASE_PATH: /awdah/
          PAGES_ORIGIN: ${{ vars.PAGES_ORIGIN || 'https://amgad01.github.io' }}
          PAGES_SITE_URL: https://amgad01.github.io/awdah/
          PAGES_CNAME: ${{ vars.PAGES_CNAME }}
          SKIP_SHARED_BUILD: '1'

      - name: Verify Pages bundle paths
        run: ./scripts/verify-pages-dist.sh apps/frontend/dist https://amgad01.github.io/awdah/ /awdah/

      - name: Configure Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/frontend/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.release_tag }}
          name: Awdah ${{ steps.release_tag.outputs.release_tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          make_latest: true

      - name: Smoke test deployed Pages site
        run: |
          expected_url="https://amgad01.github.io/awdah/"
          page_url="${{ steps.deployment.outputs.page_url }}"

          case "$page_url" in
            "$expected_url"|"$expected_url"*)
              ;;
            *)
              echo "Unexpected GitHub Pages URL: $page_url"
              exit 1
              ;;
          esac

          body=$(curl --fail --silent --show-error --location --retry 6 --retry-all-errors "$expected_url")
          printf '%s' "$body" | grep -q 'Awdah'
          printf '%s' "$body" | grep -q '/awdah/assets/'
          printf '%s' "$body" | grep -q 'https://amgad01.github.io/awdah/'
