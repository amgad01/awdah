name: Deploy to GitHub Pages

on:
  workflow_dispatch:
    inputs:
      confirm_branch_release_tag:
        description: 'Check this to deploy with the version parsed from the selected release/* branch. Leave unchecked only if you fill in release_tag.'
        required: false
        type: boolean
        default: false
      release_tag:
        description: 'Optional semver override for manual runs (example: v1.1.0)'
        required: false
      release_tagger_name:
        description: 'Optional Git tagger name to use for the release tag'
        required: false
      release_tagger_email:
        description: 'Optional Git tagger email to use for the release tag'
        required: false
        type: string
      source_ref:
        description: '[Internal] Source branch/ref to deploy. Leave blank for manual runs.'
        required: false
        type: string
      source_sha:
        description: '[Internal] Exact commit SHA to deploy. Leave blank for manual runs.'
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: deploy-pages-${{ inputs.source_sha || github.sha }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare pages release context
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      source_ref: ${{ steps.context.outputs.source_ref }}
      source_sha: ${{ steps.context.outputs.source_sha }}
      release_tag: ${{ steps.context.outputs.release_tag }}
    steps:
      - name: Checkout release workflow code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          ref: ${{ inputs.source_sha || github.sha }}

      - name: Resolve source ref, SHA, and release tag
        id: context
        uses: ./.github/actions/prepare-release
        with:
          confirm-branch-release-tag: ${{ inputs.confirm_branch_release_tag }}
          release-tag-input: ${{ inputs.release_tag || '' }}
          source-ref: ${{ inputs.source_ref || github.ref_name }}
          source-sha: ${{ inputs.source_sha || github.sha }}
          require-branch-release-tag-confirmation: ${{ github.event_name == 'workflow_dispatch' && 'true' || 'false' }}

  approve:
    name: 'Approve: ${{ needs.prepare.outputs.release_tag }} @ ${{ needs.prepare.outputs.source_sha }}'
    runs-on: ubuntu-latest
    needs: prepare
    environment: github-pages
    steps:
      - name: Approval granted
        run: echo "Approved pages deploy"

  deploy:
    name: Build and deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: [prepare, approve]
    permissions:
      contents: write
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
      SOURCE_SHA: ${{ needs.prepare.outputs.source_sha }}
      AWS_DEFAULT_REGION: ${{ vars.AWS_DEFAULT_REGION }}
      AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}
      PAGES_ORIGIN: ${{ vars.PAGES_ORIGIN }}
      PAGES_BASE_PATH: ${{ vars.PAGES_BASE_PATH }}
      PAGES_SITE_URL: ${{ vars.PAGES_SITE_URL }}
      PAGES_CNAME: ${{ vars.PAGES_CNAME }}

    steps:
      - name: Checkout release commit
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.source_sha }}
          fetch-depth: 0

      - name: Setup and build
        uses: ./.github/actions/setup-and-build
        with:
          skip-checkout: 'true'

      - name: Create and push release tag
        run: |
          tagger_name='${{ inputs.release_tagger_name }}'
          tagger_email='${{ inputs.release_tagger_email }}'

          if [ -z "$tagger_name" ]; then
            tagger_name='github-actions[bot]'
          fi

          if [ -z "$tagger_email" ]; then
            tagger_email='github-actions[bot]@users.noreply.github.com'
          fi

          git config user.name "$tagger_name"
          git config user.email "$tagger_email"
          git fetch --tags --force

          if git rev-parse --verify --quiet "refs/tags/$RELEASE_TAG" >/dev/null 2>&1; then
            tagged_sha="$(git rev-list -n 1 "$RELEASE_TAG")"
            if [ "$tagged_sha" != "$SOURCE_SHA" ]; then
              echo "Tag $RELEASE_TAG already points to $tagged_sha, expected $SOURCE_SHA."
              exit 1
            fi
            echo "Tag $RELEASE_TAG already exists locally on the correct commit."
          else
            git tag -a "$RELEASE_TAG" "$SOURCE_SHA" -m "GitHub Pages release $RELEASE_TAG"
          fi

          remote_tag_sha="$(git ls-remote origin "refs/tags/${RELEASE_TAG}^{}" | awk '{print $1}' | head -n 1)"
          if [ -n "$remote_tag_sha" ]; then
            if [ "$remote_tag_sha" != "$SOURCE_SHA" ]; then
              echo "Remote tag $RELEASE_TAG already points to $remote_tag_sha, expected $SOURCE_SHA."
              exit 1
            fi
            echo "Tag $RELEASE_TAG already exists on origin for the correct commit."
          else
            git push origin "$RELEASE_TAG"
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_DEFAULT_REGION }}

      - name: Build frontend for GitHub Pages
        run: ./scripts/build-frontend.sh prod
        env:
          VITE_AUTH_MODE: cognito
          VITE_AWS_REGION: ${{ vars.AWS_DEFAULT_REGION }}
          VITE_APP_VERSION: ${{ needs.prepare.outputs.release_tag }}
          VITE_APP_RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
          VITE_APP_EMAIL: ${{ secrets.VITE_APP_EMAIL }}
          PAGES_BASE_PATH: ${{ vars.PAGES_BASE_PATH }}
          PAGES_ORIGIN: ${{ vars.PAGES_ORIGIN }}
          PAGES_SITE_URL: ${{ vars.PAGES_SITE_URL }}
          PAGES_CNAME: ${{ vars.PAGES_CNAME }}
          SKIP_SHARED_BUILD: '1'

      - name: Verify Pages bundle paths
        run: ./scripts/verify-pages-dist.sh apps/frontend/dist ${{ vars.PAGES_SITE_URL }} ${{ vars.PAGES_BASE_PATH }}

      - name: Configure Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/frontend/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.release_tag }}
          name: Awdah ${{ needs.prepare.outputs.release_tag }}
          target_commitish: ${{ needs.prepare.outputs.source_sha }}
          generate_release_notes: true
          make_latest: true

      - name: Smoke test deployed Pages site
        run: |
          expected_url="${{ vars.PAGES_SITE_URL }}"
          page_url="${{ steps.deployment.outputs.page_url }}"

          case "$page_url" in
            "$expected_url"|"$expected_url"*)
              ;;
            *)
              echo "Unexpected GitHub Pages URL: $page_url"
              exit 1
              ;;
          esac

          body=$(curl --fail --silent --show-error --location --retry 6 --retry-all-errors "$expected_url")
          printf '%s' "$body" | grep -q 'Awdah'
          printf '%s' "$body" | grep -q "${{ vars.PAGES_BASE_PATH }}assets/"
          printf '%s' "$body" | grep -q "${{ vars.PAGES_SITE_URL }}"
