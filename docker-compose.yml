services:
  localstack:
    image: localstack/localstack:4.4.0
    ports:
      - '4566:4566'
    environment:
      - SERVICES=dynamodb,s3,sqs,sns,events,secretsmanager
      - DEFAULT_REGION=eu-west-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - DEBUG=0
      - PERSISTENCE=1
    volumes:
      - localstack-data:/var/lib/localstack
      - /var/run/docker.sock:/var/run/docker.sock
      - ./docker/localstack/init:/etc/localstack/init/ready.d
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'curl -fsS http://localhost:4566/_localstack/health | grep -Eq ''"dynamodb"[[:space:]]*:[[:space:]]*"(running|available)"''',
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    environment:
      - NODE_ENV=development
      - DEPLOY_ENV=dev
      - PORT=3000
      # DEV_AUTH_BYPASS allows the local Express simulator to accept requests
      # without an x-user-id header, falling back to 'local-dev-user'.
      # This flag is checked only in src/index.ts (local runner) and is never
      # present in production Lambda environments — safe to commit here.
      - DEV_AUTH_BYPASS=true
      - LOCALSTACK_ENDPOINT=http://localstack:4566
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_REGION=eu-west-1
      - AWS_DEFAULT_REGION=eu-west-1
      - PRAYER_LOGS_TABLE=Awdah-PrayerLogs-dev
      - FAST_LOGS_TABLE=Awdah-FastLogs-dev
      - PRACTICING_PERIODS_TABLE=Awdah-PracticingPeriods-dev
      - USER_SETTINGS_TABLE=Awdah-UserSettings-dev
      - USER_LIFECYCLE_JOBS_TABLE=Awdah-UserLifecycleJobs-dev
      - DELETED_USERS_TABLE=Awdah-DeletedUsers-dev
      - COGNITO_USER_POOL_ID=eu-west-1_localdev
      - ENABLE_E2E_SEED=true
    depends_on:
      localstack:
        condition: service_healthy
    ports:
      - '3000:3000'
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "fetch(''http://127.0.0.1:3000/health'').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"',
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        - VITE_API_BASE_URL=
        - VITE_AUTH_MODE=local
        - VITE_AWS_REGION=eu-west-1
        - VITE_APP_VERSION=dev
        - VITE_APP_EMAIL=${VITE_APP_EMAIL:-${ALERT_EMAIL:-}}
    ports:
      - '8080:80'
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1/ >/dev/null 2>&1']
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

volumes:
  localstack-data:
